        // WBS 번호 재계산 알고리즘 (들여쓰기/내어쓰기/이동 완벽 대응)
        function recalculateAllWBS(depthChangesMap) {
            const raw = window.APP_STATE.rawTasks;
            const counts = [];
            const updates = [];

            for(let i=0; i<raw.length; i++) {
                const t = raw[i];
                let currentDepth = getDepth(t.wbs);
                
                if (depthChangesMap[t.id]) {
                    currentDepth += depthChangesMap[t.id];
                    if (currentDepth < 0) currentDepth = 0;
                }

                // 상위 작업보다 Depth가 2단계 이상 깊어지는 것 방지
                const prevDepth = i > 0 ? getDepth(raw[i-1].wbs) + (depthChangesMap[raw[i-1].id] || 0) : -1;
                if (currentDepth > prevDepth + 1) currentDepth = prevDepth + 1;

                while(counts.length <= currentDepth) counts.push(0);
                counts.length = currentDepth + 1;
                counts[currentDepth]++;
                
                const newWbs = counts.join('.');
                if(newWbs !== t.wbs) {
                    updates.push({ id: t.id, wbs: newWbs });
                    t.wbs = newWbs; // 메모리에 즉시 적용
                }
            }
            return updates;
        }

        // 자동 일정 변경 연쇄 적용
        window.cascadeDates = async (predId, newPredEnd) => {
            const updates = {};
            const rawTasks = window.APP_STATE.rawTasks.map(t => ({...t}));
            const visited = new Set();

            const calculateCascade = (currentId, currentEnd) => {
                if (visited.has(currentId)) return;
                visited.add(currentId);

                const successors = rawTasks.filter(t => t.predecessor === currentId);
                for(let succ of successors) {
                    const newStart = addDays(currentEnd, 1);
                    const newEnd = addDays(newStart, (succ.duration||1)-1);
                    
                    if(succ.start !== newStart || succ.end !== newEnd) {
                        updates[succ.id] = { start: newStart, end: newEnd };
                        succ.start = newStart;
                        succ.end = newEnd;
                        calculateCascade(succ.id, newEnd);
                    }
                }
            };

            calculateCascade(predId, newPredEnd);

            const updateKeys = Object.keys(updates);
            if(updateKeys.length === 0) return;

            const batch = writeBatch(db);
            updateKeys.forEach(id => {
                batch.update(doc(db,'artifacts',GLOBAL_APP_ID,'public','data',`ws_${window.APP_STATE.curWs}_tasks_${window.APP_STATE.curProjId}`, id), updates[id]);
            });
            await batch.commit();
        };

        function buildTreeAndRollup() {
            const raw = window.APP_STATE.rawTasks; let needsUpdate = false;
            const maxDepth = Math.max(...raw.map(t=>getDepth(t.wbs)), 0);
            for(let d = maxDepth; d >= 0; d--) {
                const parents = raw.filter(t => getDepth(t.wbs) === d);
                parents.forEach(p => {
                    const children = raw.filter(c => getDepth(c.wbs) === d+1 && isParentOf(p.wbs, c.wbs));
                    p.isParent = children.length > 0;
                    if(p.isParent) {
                        let totalP = 0, minS = null, maxE = null;
                        children.forEach(c => {
                            totalP += (parseInt(c.progress)||0);
                            if(c.start) { const s = new Date(c.start); if(!minS || s < minS) minS = s; }
                            if(c.end) { const e = new Date(c.end); if(!maxE || e > maxE) maxE = e; }
                        });
                        const avgP = children.length > 0 ? Math.round(totalP / children.length) : 0;
                        const sStr = minS ? toISODate(minS) : p.start; const eStr = maxE ? toISODate(maxE) : p.end;
                        const dur = (sStr && eStr) ? diffDays(sStr, eStr)+1 : 1;
                        if(p.progress !== avgP || p.start !== sStr || p.end !== eStr || p.duration !== dur) {
                            p.progress = avgP; p.start = sStr; p.end = eStr; p.duration = dur;
                            updateDoc(doc(db, 'artifacts', GLOBAL_APP_ID, 'public', 'data', `ws_${window.APP_STATE.curWs}_tasks_${window.APP_STATE.curProjId}`, p.id), { progress: avgP, start: sStr, end: eStr, duration: dur });
                        }
                    } else if(!p.end && p.start && p.duration) {
                        p.end = addDays(p.start, p.duration-1);
                    }
                });
            }
            
            let pTotal = 0, pMinS = null, pMaxE = null, topLevelCount = 0;
            raw.filter(t=>getDepth(t.wbs)===0).forEach(t => {
                topLevelCount++; pTotal += (parseInt(t.progress)||0);
                if(t.start) { const s = new Date(t.start); if(!pMinS || s < pMinS) pMinS = s; }
                if(t.end) { const e = new Date(t.end); if(!pMaxE || e > pMaxE) pMaxE = e; }
            });
            const pAvg = topLevelCount>0 ? Math.round(pTotal/topLevelCount) : 0;
            const pSStr = pMinS ? toISODate(pMinS) : null; const pEStr = pMaxE ? toISODate(pMaxE) : null;
            
            const meta = window.APP_STATE.projList.find(p=>p.id===window.APP_STATE.curProjId);
            if(meta && (meta.progress !== pAvg || meta.start !== pSStr || meta.end !== pEStr)) {
                updateDoc(doc(db,'artifacts',GLOBAL_APP_ID,'public','data',`ws_${window.APP_STATE.curWs}_projects`,window.APP_STATE.curProjId), {progress:pAvg, start:pSStr, end:pEStr});
            }
        }

        function renderGanttUI() {
            const list = document.getElementById('task-list'); list.innerHTML = '';
            const hdr = document.getElementById('gantt-header'); hdr.innerHTML = '';
            const bdy = document.getElementById('gantt-body'); bdy.querySelectorAll('.gantt-bar, .dependency-line, .today-line, .temp-link-line').forEach(e=>e.remove());
            const empty = document.getElementById('gantt-empty-state');
            
            const svg = document.getElementById('gantt-lines');
            svg.innerHTML = '<defs><marker id="arrowhead" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto"><polygon points="0 0, 6 2, 0 4" fill="#64748b" /></marker></defs>';

            let raw = window.APP_STATE.rawTasks;
            if(raw.length===0) { empty.classList.remove('hidden'); return; }
            empty.classList.add('hidden');

            const filterVal = document.getElementById('task-filter-select').value;
            
            // 오늘 및 이번주 범위 계산
            const todayObj = new Date();
            todayObj.setHours(0,0,0,0);
            const todayStr = toISODate(todayObj);

            const dayOfWeek = todayObj.getDay(); 
            const startOfWeek = new Date(todayObj);
            startOfWeek.setDate(todayObj.getDate() - dayOfWeek);
            const endOfWeek = new Date(todayObj);
            endOfWeek.setDate(todayObj.getDate() + (6 - dayOfWeek));
            const startWeekStr = toISODate(startOfWeek);
            const endWeekStr = toISODate(endOfWeek);

            const getPredOpts = (currId, predId) => {
                let opts = `<option value="">없음</option>`;
                window.APP_STATE.rawTasks.forEach(t => { if(t.id !== currId) opts += `<option value="${t.id}" ${predId===t.id?'selected':''}>${t.wbs}. ${t.name}</option>`; });
                return opts;
            };

            let visibleTasks = [];
            for(let i=0; i<raw.length; i++) {
                const t = raw[i]; let isHidden = false;
                window.collapsedWBS.forEach(cwbs => { if(isParentOf(cwbs, t.wbs)) isHidden = true; });
                
                // 필터 적용
                if(filterVal === 'completed' && (t.progress || 0) < 100) isHidden = true;
                if(filterVal === 'active' && (t.progress || 0) === 100) isHidden = true;
                if(filterVal === 'today' && t.end !== todayStr) isHidden = true;
                if(filterVal === 'this_week' && (!t.end || t.end < startWeekStr || t.end > endWeekStr)) isHidden = true;
                
                if(!isHidden) visibleTasks.push(t);
            }
            
            // 화면에 보이는 항목들을 전역 상태로 저장 (Shift-Click 범위 지정을 위함)
            window.APP_STATE.visibleTasks = visibleTasks;

            visibleTasks.forEach((t, idx) => {
                const depth = getDepth(t.wbs);
                const isChecked = window.APP_STATE.selectedTasks.has(t.id);
                const isCollapsed = window.collapsedWBS.has(t.wbs);
                
                const tr = document.createElement('tr');
                tr.className = `draggable-row border-b border-gray-300 h-8 ${isChecked ? 'selected-row' : ''}`;
                tr.draggable = true; tr.dataset.id = t.id; tr.dataset.idx = idx;
                
                tr.addEventListener('dragstart', (e) => { e.dataTransfer.setData('text/plain', t.id); tr.classList.add('opacity-50'); });
                tr.addEventListener('dragend', () => { tr.classList.remove('opacity-50'); document.querySelectorAll('.drag-over-top, .drag-over-bottom').forEach(el=>el.classList.remove('drag-over-top', 'drag-over-bottom')); });
                tr.addEventListener('dragover', (e) => {
                    e.preventDefault(); const rect = tr.getBoundingClientRect(); const mid = rect.top + rect.height/2;
                    tr.classList.remove('drag-over-top', 'drag-over-bottom');
                    if(e.clientY < mid) tr.classList.add('drag-over-top'); else tr.classList.add('drag-over-bottom');
                });
                tr.addEventListener('dragleave', () => { tr.classList.remove('drag-over-top', 'drag-over-bottom'); });
                tr.addEventListener('drop', (e) => {
                    e.preventDefault(); tr.classList.remove('drag-over-top', 'drag-over-bottom');
                    const dragId = e.dataTransfer.getData('text/plain'); if(dragId === t.id) return;
                    const rect = tr.getBoundingClientRect(); const dropAfter = e.clientY > rect.top + rect.height/2;
                    window.reorderTasks(dragId, t.id, dropAfter);
                });

                // 현재 선행 작업의 WBS 번호 찾기
                const predTaskObj = t.predecessor ? window.APP_STATE.rawTasks.find(x => x.id === t.predecessor) : null;
                const predWbsStr = predTaskObj ? predTaskObj.wbs : '';

                // 더블 클릭(ondblclick) 시 수정 가능한 읽기 전용 템플릿 헬퍼
                const inputTemplate = (type, val, field, isParent, extraCls="", extraAttrs="") => {
                    const isDisabled = isParent && (field==='start'||field==='end'||field==='duration'||field==='progress');
                    return `<input type="${type}" value="${val}" ${isDisabled ? 'disabled' : 'readonly'} 
                        ondblclick="if(!this.disabled){this.removeAttribute('readonly'); this.focus();}" 
                        onblur="this.setAttribute('readonly', true);" 
                        onchange="${field==='start'||field==='end'||field==='duration' ? `window.updateTaskDate('${t.id}', '${field}', this.value)` : (field==='predecessor' ? `window.updatePredecessorByWBS('${t.id}', this.value)` : `window.updateTask('${t.id}', '${field}', this.value)`)}" 
                        class="cell-input ${extraCls}" ${extraAttrs}>`;
                };

                tr.innerHTML = `
                    <td class="p-0 text-center border-r border-gray-300 bg-gray-50 cursor-pointer col-checkbox" onclick="window.toggleTaskSelect(event, '${t.id}', ${idx})">
                        <input type="checkbox" value="${t.id}" ${isChecked?'checked':''} class="pointer-events-none accent-blue-600 scale-90">
                    </td>
                    <td class="p-0 text-center text-xs text-gray-500 border-r border-gray-300 font-mono col-wbs">${t.wbs||'-'}</td>
                    <td class="p-0 border-r border-gray-300 col-name">
                        <div class="flex items-center h-full w-full" style="padding-left:${depth*1}rem">
                            ${t.isParent ? `<button onclick="window.toggleCollapse('${t.wbs}')" class="w-4 flex-shrink-0 text-gray-500 hover:text-gray-800 outline-none"><i class="fa-solid ${isCollapsed?'fa-plus-square':'fa-minus-square'}"></i></button>` : `<span class="w-4 flex-shrink-0 inline-block"></span>`}
                            ${inputTemplate('text', t.name||'', 'name', false, `truncate ${t.isParent?'font-bold':''}`)}
                        </div>
                    </td>
                    <td class="p-0 border-r border-gray-300 col-duration">${inputTemplate('number', t.duration||1, 'duration', t.isParent, 'text-center', 'min="1"')}</td>
                    <td class="p-0 border-r border-gray-300 col-start">${inputTemplate('date', t.start||'', 'start', t.isParent, 'text-center')}</td>
                    <td class="p-0 border-r border-gray-300 col-end">${inputTemplate('date', t.end||'', 'end', t.isParent, 'text-center')}</td>
                    <td class="p-0 border-r border-gray-300 relative col-progress">
                        ${inputTemplate('number', t.progress||0, 'progress', t.isParent, `text-center font-semibold text-${t.progress===100?'emerald':'blue'}-600 pr-3`)}
                        <span class="absolute right-2 top-1.5 text-gray-400 pointer-events-none text-[10px]">%</span>
                    </td>
                    <td class="p-0 border-r border-gray-300 col-predecessor">
                        ${inputTemplate('text', predWbsStr, 'predecessor', false, 'text-center text-gray-600 font-mono', 'placeholder="WBS"')}
                    </td>
                    <td class="p-0 border-r border-gray-300 col-manager">${inputTemplate('text', t.manager||'', 'manager', false, 'text-center text-gray-600')}</td>
                    <td class="p-0 border-r border-gray-300 col-priority">
                        <select onchange="window.updateTask('${t.id}', 'priority', this.value)" class="cell-input text-gray-600 cursor-pointer text-center">
                            <option value="low" ${t.priority==='low'?'selected':''}>낮음</option>
                            <option value="normal" ${!t.priority || t.priority==='normal'?'selected':''}>보통</option>
                            <option value="high" ${t.priority==='high'?'selected':''}>높음</option>
                        </select>
                    </td>
                    <td class="p-0 border-r border-gray-300 col-notes">${inputTemplate('text', t.notes||'', 'notes', false, 'text-gray-600', 'placeholder="메모"')}</td>
                    <td class="p-0 border-r border-gray-300 col-link">
                        <div class="flex items-center h-full w-full px-1 gap-1">
                            ${inputTemplate('url', t.link||'', 'link', false, 'truncate flex-1', 'placeholder="드라이브 URL"')}
                            ${t.link ? `<a href="${t.link.startsWith('http') ? t.link : 'https://'+t.link}" target="_blank" title="산출물 열기" class="text-blue-500 hover:text-blue-700 shrink-0 px-1"><i class="fa-solid fa-file-lines"></i></a>` : ''}
                        </div>
                    </td>
                `;
                list.appendChild(tr);
            });

            window.applyColVisibility();

            // Gantt Time Scale & Bars
            let minD = new Date(); let maxD = new Date();
            visibleTasks.forEach(t => { 
                if(t.start) { const d = new Date(t.start); if(d < minD) minD = d; }
                if(t.end) { const d = new Date(t.end); if(d > maxD) maxD = d; }
            });
            minD.setDate(minD.getDate() - 3); maxD.setDate(maxD.getDate() + 14);
            
            const totalDays = Math.max(40, diffDays(minD, maxD));
            const totalWidth = totalDays * 30; // 30px per day

            // 횡스크롤을 위한 컨테이너 너비 지정
            hdr.style.width = `${totalWidth}px`;
            bdy.style.width = `${totalWidth}px`;
            svg.style.width = `${totalWidth}px`;
            
            for(let i=0; i<totalDays; i++) {
                const d = new Date(minD); d.setDate(d.getDate() + i);
                const isWeekend = d.getDay() === 0 || d.getDay() === 6;
                hdr.innerHTML += `<div class="flex-shrink-0 text-center border-r border-gray-300 h-full flex flex-col items-center justify-center ${isWeekend?'bg-gray-200':''}" style="width:30px;"><span class="text-[9px] text-gray-400 leading-none mb-0.5">${d.getMonth()+1}/${d.getDate()}</span><span class="text-[8px] text-gray-500 leading-none">${['S','M','T','W','T','F','S'][d.getDay()]}</span></div>`;
            }
            
            // 오늘 날짜 표시 (Today Line)
            const todayDate = new Date();
            todayDate.setHours(0,0,0,0);
            const minDZero = new Date(minD);
            minDZero.setHours(0,0,0,0);
            
            if(todayDate >= minDZero && todayDate <= maxD) {
                const offsetToday = diffDays(minDZero, todayDate);
                const todayLine = document.createElement('div');
                todayLine.className = 'today-line absolute top-0 bottom-0 border-l-2 border-red-500 pointer-events-none z-0';
                todayLine.style.left = `${(offsetToday * 30) + 15}px`; // 중앙 정렬
                bdy.appendChild(todayLine);
            }

            const taskPositions = {};

            visibleTasks.forEach((t, i) => {
                if(!t.start) return;
                const offset = diffDays(minD, t.start);
                const dur = Math.max(t.duration || 1, 1);
                const bar = document.createElement('div'); 
                bar.className = `gantt-bar ${t.isParent?'is-parent':''} ${t.progress===100?'is-completed':''}`;
                bar.style.left = `${offset * 30}px`; bar.style.top = `${(i * 32) + 7}px`; // align to row height 32px
                bar.style.width = `${dur * 30}px`;
                bar.id = `bar-${t.id}`;
                
                // 위치 저장 (화살표 렌더링용)
                taskPositions[t.id] = { rightX: (offset*30)+(dur*30), leftX: offset*30, y: (i*32)+7+9 };

                if(!t.isParent) {
                    bar.onmousedown = (e) => window.startGanttDrag(e, t.id, 'move');
                    // 새롭게 추가된 link-handle (연결선 드래그 핸들)
                    bar.innerHTML = `<div class="gantt-progress" style="width: ${t.progress||0}%"></div><span class="gantt-label">${t.name}</span>
                                     <div class="resize-handle" onmousedown="event.stopPropagation(); window.startGanttDrag(event, '${t.id}', 'resize')"></div>
                                     <div class="link-handle" onmousedown="event.stopPropagation(); window.startLinkDrag(event, '${t.id}')" title="드래그하여 선행 작업 연결"></div>`;
                } else {
                    bar.innerHTML = `<div class="gantt-progress" style="width: ${t.progress||0}%"></div><span class="gantt-label" style="top:-14px; left:0;">${t.name}</span>`;
                }
                bdy.appendChild(bar);
            });

            // 화살표 렌더링
            visibleTasks.forEach(t => {
                if(t.predecessor && taskPositions[t.predecessor] && taskPositions[t.id]) {
                    const p1 = taskPositions[t.predecessor];
                    const p2 = taskPositions[t.id];
                    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    let d = '';
                    if(p2.leftX > p1.rightX + 10) {
                        d = `M ${p1.rightX} ${p1.y} L ${p1.rightX+10} ${p1.y} L ${p1.rightX+10} ${p2.y} L ${p2.leftX-2} ${p2.y}`;
                    } else {
                        d = `M ${p1.rightX} ${p1.y} L ${p1.rightX+10} ${p1.y} L ${p1.rightX+10} ${p1.y+16} L ${p2.leftX-10} ${p1.y+16} L ${p2.leftX-10} ${p2.y} L ${p2.leftX-2} ${p2.y}`;
                    }
                    path.setAttribute('d', d); path.setAttribute('fill', 'none'); path.setAttribute('stroke', '#64748b'); path.setAttribute('stroke-width', '1.5'); path.setAttribute('marker-end', 'url(#arrowhead)');
                    svg.appendChild(path);
                }
            });
        }

        // ================= 간트 마우스 드래그 (이동 및 리사이즈) =================
        let dragInfo = null;
        window.startGanttDrag = (e, taskId, mode) => {
            if(e.button !== 0) return; e.preventDefault(); e.stopPropagation();
            const bar = document.getElementById(`bar-${taskId}`); const task = window.APP_STATE.rawTasks.find(t=>t.id===taskId);
            dragInfo = { taskId, mode, bar, task, startX: e.clientX, origLeft: parseFloat(bar.style.left), origWidth: parseFloat(bar.style.width), scrollLeft: document.getElementById('gantt-scroll-area').scrollLeft };
            document.body.style.cursor = mode==='resize' ? 'ew-resize' : 'grabbing';
            document.addEventListener('mousemove', onGanttDrag); document.addEventListener('mouseup', onGanttDrop);
        };
        function onGanttDrag(e) {
            if(!dragInfo) return;
            const totalDelta = (e.clientX - dragInfo.startX) + (document.getElementById('gantt-scroll-area').scrollLeft - dragInfo.scrollLeft);
            if(dragInfo.mode === 'move') { dragInfo.bar.style.left = `${Math.round(Math.max(0, dragInfo.origLeft + totalDelta) / 30) * 30}px`; } 
            else if(dragInfo.mode === 'resize') { dragInfo.bar.style.width = `${Math.round(Math.max(30, dragInfo.origWidth + totalDelta) / 30) * 30}px`; }
        }
        async function onGanttDrop() {
            document.removeEventListener('mousemove', onGanttDrag); document.removeEventListener('mouseup', onGanttDrop); document.body.style.cursor = '';
            if(!dragInfo) return;
            const diffDaysLeft = Math.round((parseFloat(dragInfo.bar.style.left) - dragInfo.origLeft) / 30);
            const newDuration = Math.round(parseFloat(dragInfo.bar.style.width) / 30);
            if(diffDaysLeft !== 0 || newDuration !== parseInt(dragInfo.task.duration)) {
                let newStart = dragInfo.task.start;
                if(diffDaysLeft !== 0) newStart = addDays(newStart, diffDaysLeft);
                const newEnd = addDays(newStart, newDuration - 1);
                await updateDoc(doc(db, 'artifacts', GLOBAL_APP_ID, 'public', 'data', `ws_${window.APP_STATE.curWs}_tasks_${window.APP_STATE.curProjId}`, dragInfo.taskId), { start: newStart, end: newEnd, duration: newDuration });
                window.cascadeDates(dragInfo.taskId, newEnd);
            }
            dragInfo = null;
        }

        // ================= 간트 마우스 드래그 (의존성 연결선 Link Drag) =================
        let linkDragInfo = null;
        window.startLinkDrag = (e, taskId) => {
            if(e.button !== 0) return; 
            e.preventDefault(); e.stopPropagation();
            
            const svg = document.getElementById('gantt-lines');
            const scrollArea = document.getElementById('gantt-scroll-area');
            const rect = svg.getBoundingClientRect();
            
            const startX = e.clientX - rect.left + scrollArea.scrollLeft;
            const startY = e.clientY - rect.top;

            const tempLine = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            tempLine.setAttribute('stroke', '#f59e0b');
            tempLine.setAttribute('stroke-width', '2');
            tempLine.setAttribute('stroke-dasharray', '4');
            tempLine.setAttribute('fill', 'none');
            tempLine.setAttribute('class', 'temp-link-line pointer-events-none');
            svg.appendChild(tempLine);

            linkDragInfo = { taskId, startX, startY, tempLine, svgRect: rect, scrollArea };
            
            document.body.style.cursor = 'crosshair';
            document.addEventListener('mousemove', onLinkDrag);
            document.addEventListener('mouseup', onLinkDrop);
        };

        function onLinkDrag(e) {
            if(!linkDragInfo) return;
            const curX = e.clientX - linkDragInfo.svgRect.left + linkDragInfo.scrollArea.scrollLeft;
            const curY = e.clientY - linkDragInfo.svgRect.top;
            
            // 베지어 곡선으로 그리기
            const d = `M ${linkDragInfo.startX} ${linkDragInfo.startY} C ${linkDragInfo.startX + 50} ${linkDragInfo.startY}, ${curX - 50} ${curY}, ${curX} ${curY}`;
            linkDragInfo.tempLine.setAttribute('d', d);
        }

        async function onLinkDrop(e) {
            document.removeEventListener('mousemove', onLinkDrag);
            document.removeEventListener('mouseup', onLinkDrop);
            document.body.style.cursor = '';
            
            if(!linkDragInfo) return;
            linkDragInfo.tempLine.remove();
            
            // 마우스를 놓은 위치의 요소 찾기
            const el = document.elementFromPoint(e.clientX, e.clientY);
            const targetBar = el ? el.closest('.gantt-bar') : null;

            if (targetBar) {
                const targetId = targetBar.id.replace('bar-', '');
                if (targetId && targetId !== linkDragInfo.taskId) {
                    const targetTask = window.APP_STATE.rawTasks.find(x => x.id === targetId);
                    const predTask = window.APP_STATE.rawTasks.find(x => x.id === linkDragInfo.taskId);
                    
                    if (targetTask && !targetTask.isParent && predTask) {
                        let newStart = targetTask.start;
                        let newEnd = targetTask.end;
                        
                        if (predTask.end) {
                            newStart = addDays(predTask.end, 1);
                            newEnd = addDays(newStart, (targetTask.duration || 1) - 1);
                        }
                        
                        L();
                        await updateDoc(doc(db, 'artifacts', GLOBAL_APP_ID, 'public', 'data', `ws_${window.APP_STATE.curWs}_tasks_${window.APP_STATE.curProjId}`, targetId), {
                            predecessor: predTask.id,
                            start: newStart,
                            end: newEnd
                        });
                        await window.cascadeDates(targetId, newEnd);
                        H();
                    } else if (targetTask && targetTask.isParent) {
                        window.showAlert("상위(요약) 작업은 선행 작업의 영향을 직접 받을 수 없습니다.");
                    }
                }
            }
            linkDragInfo = null;
        }

        // ================= 데이터 편집 =================
        window.addNewTask = async () => {
            const raw = window.APP_STATE.rawTasks; let maxWbs = 0; raw.forEach(t=>{ const v=parseInt((t.wbs||'0').split('.')[0]); if(v>maxWbs) maxWbs=v; });
            await addDoc(collection(db,'artifacts',GLOBAL_APP_ID,'public','data',`ws_${window.APP_STATE.curWs}_tasks_${window.APP_STATE.curProjId}`), {
                wbs:(maxWbs+1).toString(), name:'새 작업', duration:1, start:toISODate(new Date()), end:toISODate(new Date()), progress:0, priority: 'normal', notes: '', link: ''
            });
        };
        
        window.updateTask = async (id, field, val) => {
            let v = val; if(field==='progress') v = Math.min(100, Math.max(0, parseInt(val)||0));
            let updateData = { [field]: v };
            await updateDoc(doc(db,'artifacts',GLOBAL_APP_ID,'public','data',`ws_${window.APP_STATE.curWs}_tasks_${window.APP_STATE.curProjId}`, id), updateData);
        };

        // WBS 텍스트 직접 입력으로 선행 작업 연동하기
        window.updatePredecessorByWBS = async (taskId, wbsStr) => {
            const val = wbsStr.trim();
            let predId = null;
            let newStart = null;
            let newEnd = null;

            const currTask = window.APP_STATE.rawTasks.find(x => x.id === taskId);
            
            if (val) {
                const predTask = window.APP_STATE.rawTasks.find(x => x.wbs === val);
                if (!predTask) {
                    window.showAlert("해당 WBS 번호를 찾을 수 없습니다.");
                    renderGanttUI(); // 잘못된 입력시 원상복구
                    return;
                }
                if (predTask.id === taskId) {
                    window.showAlert("자기 자신을 선행 작업으로 지정할 수 없습니다.");
                    renderGanttUI();
                    return;
                }

                predId = predTask.id;
                if (predTask.end) {
                    newStart = addDays(predTask.end, 1);
                    newEnd = addDays(newStart, (currTask.duration || 1) - 1);
                }
            }

            L();
            const updateData = { predecessor: predId };
            if (newStart && newEnd) {
                updateData.start = newStart;
                updateData.end = newEnd;
            }
            
            await updateDoc(doc(db,'artifacts',GLOBAL_APP_ID,'public','data',`ws_${window.APP_STATE.curWs}_tasks_${window.APP_STATE.curProjId}`, taskId), updateData);
            if (updateData.end) await window.cascadeDates(taskId, updateData.end);
            H();
        };

        // 날짜 및 기간 수정 처리 로직
        window.updateTaskDate = async (id, field, val) => {
            const t = window.APP_STATE.rawTasks.find(x=>x.id===id); let update = {};
            
            if(field==='start') { 
                update.start = val; 
                update.end = addDays(val, (t.duration||1)-1); 
            }
            if(field==='duration') { 
                const d = Math.max(1, parseInt(val)||1); 
                update.duration = d; 
                update.end = addDays(t.start, d-1); 
            }
            if(field==='end') { 
                update.end = val;
                const diff = diffDays(t.start, val) + 1;
                if(diff < 1) { 
                    update.start = val; 
                    update.duration = 1; 
                } else { 
                    update.duration = diff; 
                }
            }
            
            await updateDoc(doc(db,'artifacts',GLOBAL_APP_ID,'public','data',`ws_${window.APP_STATE.curWs}_tasks_${window.APP_STATE.curProjId}`, id), update);
            if(update.end) window.cascadeDates(id, update.end);
        };
        
        // 툴바용 다중 삭제
        window.deleteSelectedTasks = async () => {
            if(window.APP_STATE.selectedTasks.size === 0) return window.showAlert("삭제할 작업을 선택하세요.");
            if(confirm(`선택한 ${window.APP_STATE.selectedTasks.size}개의 작업을 삭제하시겠습니까?`)) {
                const batch = writeBatch(db);
                window.APP_STATE.selectedTasks.forEach(id => {
                    batch.delete(doc(db,'artifacts',GLOBAL_APP_ID,'public','data',`ws_${window.APP_STATE.curWs}_tasks_${window.APP_STATE.curProjId}`, id));
                });
                await batch.commit();
                window.APP_STATE.selectedTasks.clear();
            }
        };

        // WBS 재정렬 시 순서 맞춤 연동
        window.reorderTasks = async (dragId, targetId, dropAfter) => {
            const raw = [...window.APP_STATE.rawTasks];
            const dragIdx = raw.findIndex(t=>t.id===dragId); 
            const targetIdx = raw.findIndex(t=>t.id===targetId);
            if(dragIdx<0 || targetIdx<0) return;
            
            const [dragItem] = raw.splice(dragIdx, 1);
            let insertIdx = raw.findIndex(t=>t.id===targetId) + (dropAfter?1:0);
            raw.splice(insertIdx, 0, dragItem);
            
            window.APP_STATE.rawTasks = raw;

            const depthChanges = {};
            if(insertIdx > 0) {
                const prevDepth = getDepth(raw[insertIdx-1].wbs);
                const curDepth = getDepth(dragItem.wbs);
                depthChanges[dragId] = prevDepth - curDepth;
            } else {
                depthChanges[dragId] = -getDepth(dragItem.wbs); 
            }

            const updates = recalculateAllWBS(depthChanges);
            const batch = writeBatch(db);
            updates.forEach(u => batch.update(doc(db, 'artifacts', GLOBAL_APP_ID, 'public', 'data', `ws_${window.APP_STATE.curWs}_tasks_${window.APP_STATE.curProjId}`, u.id), { wbs: u.wbs }));
            await batch.commit();
        };

        window.toggleAllTasks = (chk) => {
            window.APP_STATE.selectedTasks.clear();
            if(chk.checked) {
                const filterVal = document.getElementById('task-filter-select').value;
                const todayObj = new Date(); todayObj.setHours(0,0,0,0); const todayStr = toISODate(todayObj);
                const dayOfWeek = todayObj.getDay(); 
                const startOfWeek = new Date(todayObj); startOfWeek.setDate(todayObj.getDate() - dayOfWeek);
                const endOfWeek = new Date(todayObj); endOfWeek.setDate(todayObj.getDate() + (6 - dayOfWeek));
                const startWeekStr = toISODate(startOfWeek); const endWeekStr = toISODate(endOfWeek);

                window.APP_STATE.rawTasks.forEach(t => {
                    if(filterVal === 'completed' && (t.progress||0) < 100) return;
                    if(filterVal === 'active' && (t.progress||0) === 100) return;
                    if(filterVal === 'today' && t.end !== todayStr) return;
                    if(filterVal === 'this_week' && (!t.end || t.end < startWeekStr || t.end > endWeekStr)) return;
                    
                    window.APP_STATE.selectedTasks.add(t.id);
                });
            }
            renderGanttUI();
        };
        
        // 화면에 보이는 (Visible) 태스크 기준으로 Shift 다중 선택 적용
        window.toggleTaskSelect = (e, id, idx) => {
            if(e.target.tagName !== 'INPUT') {
                const chk = e.currentTarget.querySelector('input');
                if (chk) chk.checked = !chk.checked;
            }
            const isChecked = e.currentTarget.querySelector('input') ? e.currentTarget.querySelector('input').checked : e.target.checked;
            const set = window.APP_STATE.selectedTasks;
            const visible = window.APP_STATE.visibleTasks || [];
            
            if(e.shiftKey && window.APP_STATE.lastCheckedIdx !== null && visible.length > 0) {
                const start = Math.min(window.APP_STATE.lastCheckedIdx, idx); 
                const end = Math.max(window.APP_STATE.lastCheckedIdx, idx);
                for(let i=start; i<=end; i++) { 
                    if(visible[i]) {
                        if(isChecked) set.add(visible[i].id); 
                        else set.delete(visible[i].id); 
                    }
                }
            } else {
                if(isChecked) set.add(id); else set.delete(id);
                window.APP_STATE.lastCheckedIdx = idx;
            }
            renderGanttUI();
        };

        window.indentSelected = async () => {
            if(window.APP_STATE.selectedTasks.size === 0) return window.showAlert("선택된 작업이 없습니다.");
            
            const depthChanges = {};
            const raw = window.APP_STATE.rawTasks;
            if(raw.length > 0 && window.APP_STATE.selectedTasks.has(raw[0].id)) {
                 window.APP_STATE.selectedTasks.delete(raw[0].id);
            }

            window.APP_STATE.selectedTasks.forEach(id => depthChanges[id] = 1);
            const updates = recalculateAllWBS(depthChanges);
            
            if(updates.length > 0) {
                const batch = writeBatch(db);
                updates.forEach(u => {
                    batch.update(doc(db,'artifacts',GLOBAL_APP_ID,'public','data',`ws_${window.APP_STATE.curWs}_tasks_${window.APP_STATE.curProjId}`,u.id), {wbs:u.wbs});
                });
                await batch.commit();
            }
            window.APP_STATE.selectedTasks.clear();
            renderGanttUI();
        };

        window.outdentSelected = async () => {
            if(window.APP_STATE.selectedTasks.size === 0) return window.showAlert("선택된 작업이 없습니다.");
            
            const depthChanges = {};
            window.APP_STATE.selectedTasks.forEach(id => depthChanges[id] = -1);
            const updates = recalculateAllWBS(depthChanges);
            
            if(updates.length > 0) {
                const batch = writeBatch(db);
                updates.forEach(u => {
                    batch.update(doc(db,'artifacts',GLOBAL_APP_ID,'public','data',`ws_${window.APP_STATE.curWs}_tasks_${window.APP_STATE.curProjId}`,u.id), {wbs:u.wbs});
                });
                await batch.commit();
            }
            window.APP_STATE.selectedTasks.clear();
            renderGanttUI();
        };

        // ================= 전문적인 보고서 대시보드 =================
        window.generateDashboardReport = () => {
            const list = window.APP_STATE.projList;
            if(list.length===0) return window.showAlert("프로젝트가 없습니다.");
            
            const total = list.length;
            const comp = list.filter(p=>p.progress===100).length;
            const act = total - comp;
            const avgProg = Math.round(list.reduce((sum, p)=>sum+(p.progress||0),0)/total);
            
            document.getElementById('report-main-title').innerText = "워크스페이스 요약 보고서";
            
            let html = `
                <div class="mb-6 flex justify-between items-end border-b border-gray-200 pb-2">
                    <div>
                        <h3 class="text-2xl font-bold text-gray-800">${window.APP_STATE.curWsMeta.name}</h3>
                        <p class="text-gray-500 text-xs">보고서 생성 일시: ${new Date().toLocaleString()}</p>
                    </div>
                </div>
                
                <div class="grid grid-cols-4 gap-4 mb-8">
                    <div class="report-card border-l-4 border-blue-500">
                        <div class="text-gray-500 text-xs font-bold mb-1">총 프로젝트</div>
                        <div class="text-2xl font-bold text-gray-800">${total}</div>
                    </div>
                    <div class="report-card border-l-4 border-emerald-500">
                        <div class="text-gray-500 text-xs font-bold mb-1">완료됨</div>
                        <div class="text-2xl font-bold text-gray-800">${comp}</div>
                    </div>
                    <div class="report-card border-l-4 border-amber-500">
                        <div class="text-gray-500 text-xs font-bold mb-1">진행 중</div>
                        <div class="text-2xl font-bold text-gray-800">${act}</div>
                    </div>
                    <div class="report-card border-l-4 border-indigo-500">
                        <div class="text-gray-500 text-xs font-bold mb-1">전체 평균 진행률</div>
                        <div class="text-2xl font-bold text-gray-800">${avgProg}%</div>
                    </div>
                </div>
                
                <h4 class="font-bold text-gray-700 mb-3 border-b border-gray-200 pb-1">프로젝트 목록</h4>
                <table class="w-full border-collapse border border-gray-200 text-xs">
                    <thead class="bg-gray-100 text-gray-600">
                        <tr><th class="p-2 border">프로젝트명</th><th class="p-2 border">담당자</th><th class="p-2 border">기간</th><th class="p-2 border text-center">상태</th><th class="p-2 border text-center">진행률</th></tr>
                    </thead>
                    <tbody>
            `;
            list.forEach(p => {
                html += `<tr><td class="p-2 border font-medium">${p.title}</td><td class="p-2 border">${p.manager||'-'}</td><td class="p-2 border text-gray-500">${p.start||'-'} ~ ${p.end||'-'}</td><td class="p-2 border text-center"><span class="px-2 py-0.5 rounded text-[10px] ${p.progress===100?'bg-emerald-100 text-emerald-700':'bg-blue-100 text-blue-700'}">${p.progress===100?'완료':'진행중'}</span></td><td class="p-2 border text-center font-bold">${p.progress||0}%</td></tr>`;
            });
            html += `</tbody></table>`;
            
            document.getElementById('report-content').innerHTML = html; 
            window.openModal('modal-report');
        };

        window.generateProjectReport = () => {
            const pMeta = window.APP_STATE.projList.find(p=>p.id===window.APP_STATE.curProjId);
            const tList = window.APP_STATE.rawTasks;
            
            document.getElementById('report-main-title').innerText = "프로젝트 상세 보고서";
            
            const total = tList.length;
            const comp = tList.filter(t=>t.progress===100).length;
            
            let html = `
                <div class="mb-6 flex justify-between items-end border-b border-gray-200 pb-2">
                    <div>
                        <h3 class="text-2xl font-bold text-gray-800">${pMeta.title}</h3>
                        <p class="text-gray-500 text-xs">PM: ${pMeta.manager||'미지정'} | 기간: ${pMeta.start||'-'} ~ ${pMeta.end||'-'}</p>
                    </div>
                </div>
                
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div class="report-card">
                        <div class="flex justify-between items-end mb-2">
                            <span class="text-gray-600 font-bold text-sm">전체 진행률</span>
                            <span class="text-2xl font-black text-blue-600">${pMeta.progress||0}%</span>
                        </div>
                        <div class="w-full bg-gray-200 h-3 rounded overflow-hidden"><div class="bg-blue-600 h-full" style="width:${pMeta.progress||0}%"></div></div>
                    </div>
                    <div class="report-card flex flex-col justify-center items-center">
                        <div class="text-gray-500 text-xs font-bold mb-1">총 작업 개수</div>
                        <div class="text-xl font-bold text-gray-800">${comp} / ${total} 완료</div>
                    </div>
                </div>
                
                <h4 class="font-bold text-gray-700 mb-3 border-b border-gray-200 pb-1">WBS 세부 내역</h4>
                <table class="w-full border-collapse border border-gray-200 text-xs">
                    <thead class="bg-gray-100 text-gray-600">
                        <tr><th class="p-2 border text-center w-12">WBS</th><th class="p-2 border">작업명</th><th class="p-2 border">담당자</th><th class="p-2 border text-center">기간</th><th class="p-2 border text-center">상태</th><th class="p-2 border text-center">진행률</th></tr>
                    </thead>
                    <tbody>
            `;
            tList.forEach(t => {
                const ind = "&nbsp;&nbsp;".repeat(getDepth(t.wbs));
                const bold = t.isParent ? 'font-bold bg-gray-50' : '';
                html += `<tr class="${bold}"><td class="p-2 border text-center text-gray-500">${t.wbs}</td><td class="p-2 border">${ind}${t.name}</td><td class="p-2 border">${t.manager||'-'}</td><td class="p-2 border text-center text-gray-500">${t.start||'-'} ~ ${t.end||'-'}</td><td class="p-2 border text-center"><span class="px-2 py-0.5 rounded text-[10px] ${t.progress===100?'bg-emerald-100 text-emerald-700':'bg-gray-100 text-gray-600'}">${t.progress===100?'완료':(t.isParent?'요약':'진행중')}</span></td><td class="p-2 border text-center font-bold">${t.progress||0}%</td></tr>`;
            });
            html += `</tbody></table>`;
            
            document.getElementById('report-content').innerHTML = html; 
            window.openModal('modal-report');
        };

        window.printReport = () => {
            window.print();
        };

        // Scroll sync
        window.syncScroll = () => { document.getElementById('gantt-header-container').scrollLeft = document.getElementById('gantt-scroll-area').scrollLeft; };
        
        // Resizer (Left Panel)
        let isResizing = false;
        document.getElementById('resizer')?.addEventListener('mousedown', () => { isResizing = true; document.body.style.userSelect = 'none'; });
        document.addEventListener('mousemove', (e) => { if(isResizing) { const lp = document.getElementById('left-panel'); if(lp) lp.style.width = `${Math.min(window.innerWidth-400, Math.max(300, e.clientX))}px`; } });
        document.addEventListener('mouseup', () => { if(isResizing) { isResizing = false; document.body.style.userSelect = 'auto'; } });

    </script>
</body>
</html>
